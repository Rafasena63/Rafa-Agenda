<script>
const GCAL_CLIENT_ID='605709109528-8e5271lvuuiusn3555bf67kqfqh36clc.apps.googleusercontent.com';
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
let _gcalToken=null;

function gcalLogin(callback){
  const client=google.accounts.oauth2.initTokenClient({
    client_id:GCAL_CLIENT_ID,
    scope:GCAL_SCOPE,
    callback:(resp)=>{
      if(resp.access_token){_gcalToken=resp.access_token;if(callback)callback(resp.access_token);}
    }
  });
  client.requestAccessToken();
}

async function gcalFetchEvents(token,monthsAhead=3){
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
  const to=new Date(now.getFullYear(),now.getMonth()+monthsAhead+1,0).toISOString();
  const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${from}&timeMax=${to}&singleEvents=true&orderBy=startTime&maxResults=200`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(!res.ok)return[];
  const data=await res.json();
  return data.items||[];
}

// Convierte eventos de Google Calendar a mapa {YYYY-MM-DD: [titulo,...]}
function gcalEventsToMap(events){
  const map={};
  events.forEach(ev=>{
    const dateStr=ev.start?.date||ev.start?.dateTime?.split('T')[0];
    if(!dateStr)return;
    const title=ev.summary||'(sin título)';
    if(!map[dateStr])map[dateStr]=[];
    map[dateStr].push(title);
  });
  return map;
}

// Devuelve la fecha del lunes de la semana que contiene `date`
function getMondayOf(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const dow=d.getDay();const diff=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diff);return d;
}
// Clave única para una semana: "YYYY-Www" (ISO)
function getWeekKey(mondayDate){
  const y=mondayDate.getFullYear();
  const start=new Date(y,0,1);
  const diff=mondayDate-start;
  const week=Math.ceil((diff/(86400000)+start.getDay()+1)/7);
  return`${y}-W${String(week).padStart(2,'0')}`;
}
// Lunes de la semana actual + offset en semanas
function getMondayWithOffset(offset){
  const mon=getMondayOf(new Date());
  mon.setDate(mon.getDate()+offset*7);return mon;
}
// Devuelve mapa {lun:Date, mar:Date, ...} para un lunes dado
function getWeekDatesFromMonday(mon){
  const map={};
  WDAYS.forEach((d,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);map[d]=dd;});
  return map;
}

function parseSavedData(raw){
  try{
    const d=JSON.parse(raw);
    const dw=d.dayWork;
    if(Array.isArray(dw)){
      const newDw={};WORK_SLOTS.forEach(sl=>newDw[sl]=[]);
      dw.forEach(t=>{const sl=t.slot||'9:00';if(!newDw[sl])newDw[sl]=[];newDw[sl].push(t);});
      d.dayWork=newDw;
    }
    return d;
  }catch{return null;}
}

// Carga inicial desde localStorage (arranque rápido mientras llega Firebase)
const load=()=>{
  try{
    // Prioridad máxima: datos recién importados
    const priority=localStorage.getItem('so-import-priority');
    if(priority){
      localStorage.removeItem('so-import-priority');// usar solo una vez
      const d=parseSavedData(priority);
      if(d){
        // Subir a Firebase en segundo plano
        setTimeout(()=>{
          try{fbdb.ref(FB_PATH).set(JSON.parse(priority));}catch(e){console.error(e);}
        },2000);
        return d;
      }
    }
    const r=localStorage.getItem(SK);if(r)return parseSavedData(r);
    const old=localStorage.getItem(SK_OLD);if(old)return parseSavedData(old);
    return null;
  }catch{return null;}
};

// Guarda en localStorage + Firebase (debounced 1200ms)
let _saveTimer=null;
const save=(s)=>{
  const str=JSON.stringify(s);
  try{localStorage.setItem(SK,str);}catch{}
  // Firebase: guardar con debounce
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    try{
      fbdb.ref(FB_PATH).set(JSON.parse(str))
        .then(()=>window.dispatchEvent(new CustomEvent('fb-status',{detail:'saved'})))
        .catch(()=>window.dispatchEvent(new CustomEvent('fb-status',{detail:'error'})));
      window.dispatchEvent(new CustomEvent('fb-status',{detail:'saving'}));
    }catch(e){console.error('Firebase save error',e);}
  },1200);
  // File system si está vinculado
  if(FS.handle){
    FS.pending=str;
    setTimeout(async()=>{
      if(!FS.handle||!FS.pending)return;
      const data=FS.pending;FS.pending=null;
      await writeToFile(FS.handle,data);
    },800);
  }
};

// Escucha cambios en Firebase en tiempo real
function subscribeFirebase(onData){
  try{
    fbdb.ref(FB_PATH).on('value',snap=>{
      const val=snap.val();
      // No sobrescribir si hay datos prioritarios pendientes
      if(localStorage.getItem('so-import-priority'))return;
      if(val){
        try{localStorage.setItem(SK,JSON.stringify(val));}catch{}
        onData(val);
      }
      window.dispatchEvent(new CustomEvent('fb-status',{detail:'connected'}));
    },err=>{
      console.error('Firebase subscribe error',err);
      window.dispatchEvent(new CustomEvent('fb-status',{detail:'error'}));
    });
  }catch(e){console.error('Firebase subscribe error',e);}
}

// Escribe el JSON de datos dentro del archivo HTML
async function writeToFile(handle,dataStr){
  try{
    const file=await handle.getFile();
    let html=await file.text();
    const START='/*FSDATA_START*/';const END='/*FSDATA_END*/';
    const marker=`${START}${dataStr}${END}`;
    if(html.includes(START)){
      html=html.replace(new RegExp(`/\\*FSDATA_START\\*/(.|\\n|\\r)*?/\\*FSDATA_END\\*/`),'').replace(START+END,'');
    }
    html=html.replace('/*FSDATA_INJECT*/',marker);
    const writable=await handle.createWritable();
    await writable.write(html);await writable.close();
    return true;
  }catch(e){console.error('FS write error',e);return false;}
}

async function pickFile(){
  if(!window.showOpenFilePicker)return null;
  try{
    const[handle]=await window.showOpenFilePicker({
      types:[{description:'Agenda HTML',accept:{'text/html':['.html']}}],
      excludeAcceptAllOption:false,multiple:false
    });
    const perm=await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted')return null;
    FS.handle=handle;FS.status='linked';
    return handle;
  }catch{return null;}
}

/* ── TASK ITEM ────────────────────── */
function TaskItem({task,onPriority,onEdit,onDelete,onToday,onToVarios,onToWeek,onToBlock,allBlocks,blockNames,onDeleteBlock,compact}){
  const[h,sH]=useState(false);const[ed,sEd]=useState(false);const[draft,sDraft]=useState(task.text);
  const[showDate,sShowDate]=useState(false);const[showBlk,sShowBlk]=useState(false);
  const ref=useRef();
  useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
  const commit=()=>{if(draft.trim())onEdit(draft.trim());sEd(false);};
  const px=PR[task.priority]||PR.blue;
  return(
    <div onMouseEnter={()=>sH(true)} onMouseLeave={()=>{sH(false);}}
      style={{display:'flex',alignItems:'center',gap:7,padding:compact?'6px 10px':'8px 12px',borderRadius:5,
        background:h?'rgba(15,23,42,.025)':'transparent',borderLeft:`2px solid ${h?px.dot:'transparent'}`,
        transition:'all .1s',marginBottom:1,minWidth:0,position:'relative'}}>
      <PriorityDot priority={task.priority} onChange={onPriority} hover={h}/>
      {ed
        ?<input ref={ref} value={draft} onChange={e=>sDraft(e.target.value)} onBlur={commit}
            onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){sEd(false);sDraft(task.text);}}}
            style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:compact?11:12,color:'#1e293b',fontFamily:'inherit'}}/>
        :<span onDoubleClick={()=>sEd(true)}
            style={{flex:1,fontSize:compact?13:14,color:'#334155',lineHeight:'1.4',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0,cursor:'default'}}>
            {task.text}</span>}
      {h&&!ed&&(
        <div style={{display:'flex',gap:1,flexShrink:0,position:'relative'}}>
          <IBtn ico="pencil" onClick={()=>sEd(true)} title="Editar"/>
          {onToday&&<IBtn ico="clock" onClick={onToday} title="→ HOY trabajo"/>}
          {onToVarios&&<IBtn ico="inbox" onClick={onToVarios} title="→ HOY varios"/>}
          {onToWeek&&(
            <div style={{position:'relative'}}>
              <IBtn ico="calday" onClick={()=>{sShowDate(p=>!p);sShowBlk(false);}} title="→ Fecha" active={showDate}/>
              {showDate&&<DatePickerPopup onPick={dateStr=>onToWeek(dateStr)} onClose={()=>sShowDate(false)}/>}
            </div>
          )}
          {onToBlock&&allBlocks&&(
            <div style={{position:'relative'}}>
              <IBtn ico="archive" onClick={()=>{sShowBlk(p=>!p);sShowDate(false);}} title="→ BLOQUE" active={showBlk}/>
              {showBlk&&<BlockPickerPopup allBlocks={allBlocks} blockNames={blockNames||{}} onPick={bId=>onToBlock(bId)} onClose={()=>sShowBlk(false)} onDeleteBlock={onDeleteBlock}/>}
            </div>
          )}
          <IBtn ico="trash" onClick={onDelete} title="Eliminar" danger/>
        </div>
      )}
    </div>
  );
}

/* ── TASK BLOCK ───────────────────── */
function TaskBlock({block,blockName,blockCat,allCats,allBlocks,blockNames,tasks,onAdd,onUpdate,onDelete,onToday,onToVarios,onToWeek,onToBlock,onMoveBlock,onRenameBlock,onDeleteBlock,onDeleteBlockFromPicker,onMoveUp,onMoveDown,collapsed,onCollapse,filter,search}){
  const[add,sAdd]=useState(false);const[nt,sNt]=useState('');
  const[editName,sEditName]=useState(false);const[nameDraft,sNameDraft]=useState(blockName);
  const[showMove,sShowMove]=useState(false);
  const addRef=useRef();const nameRef=useRef();const menuRef=useRef();
  useEffect(()=>{if(add&&addRef.current)addRef.current.focus();},[add]);
  useEffect(()=>{if(editName&&nameRef.current)nameRef.current.focus();},[editName]);
  useEffect(()=>{
    if(!showMove)return;
    const fn=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))sShowMove(false);};
    document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);
  },[showMove]);
  const vis=tasks.filter(t=>{
    if(filter!=='all'&&t.priority!==filter)return false;
    if(search&&!t.text.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  const redC=tasks.filter(t=>t.priority==='red').length;
  const doAdd=()=>{if(nt.trim())onAdd(nt.trim());sNt('');sAdd(false);};
  const commitName=()=>{if(nameDraft.trim())onRenameBlock(block.id,nameDraft.trim());sEditName(false);};
  const moveCats=allCats.filter(c=>c.id!=='home'&&c.id!=='meses');
  return(
    <div style={{background:'#fff',border:'1px solid #e8ecf0',borderRadius:9,overflow:'visible',breakInside:'avoid',marginBottom:10,position:'relative'}}>
      <div onClick={()=>!editName&&onCollapse(!collapsed)}
        style={{display:'flex',alignItems:'center',gap:6,padding:'12px 13px',cursor:'pointer',borderBottom:collapsed?'none':'1px solid #f4f6f8',borderRadius:collapsed?9:'9px 9px 0 0'}}>
        {editName
          ?<input ref={nameRef} value={nameDraft} onChange={e=>sNameDraft(e.target.value)}
              onBlur={commitName} onClick={e=>e.stopPropagation()}
              onKeyDown={e=>{if(e.key==='Enter')commitName();if(e.key==='Escape'){sEditName(false);sNameDraft(blockName);}}}
              style={{flex:1,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',fontSize:11,fontWeight:650,color:'#1e293b',background:'transparent',fontFamily:'inherit',padding:'0 0 1px'}}/>
          :<span onDoubleClick={e=>{e.stopPropagation();sEditName(true);sNameDraft(blockName);}} title="Doble clic para renombrar"
              style={{flex:1,fontSize:13,fontWeight:650,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {blockName}</span>}
        {tasks.length>0&&<span style={{fontSize:12,color:'#94a3b8',flexShrink:0}}>{tasks.length}</span>}
        {redC>0&&<span style={{fontSize:9,fontWeight:700,background:'#fef2f2',color:'#ef4444',borderRadius:3,padding:'1px 5px',flexShrink:0}}>{redC}!</span>}
        <div style={{display:'flex',gap:2,alignItems:'center',flexShrink:0,marginLeft:'auto'}}>
          <IBtn ico="plus" onClick={()=>{sAdd(true);onCollapse(false);}} title="Añadir tarea"/>
          {onMoveUp&&<IBtn ico="chup" onClick={onMoveUp} title="Subir bloque"/>}
          {onMoveDown&&<IBtn ico="chdown" onClick={onMoveDown} title="Bajar bloque"/>}
          <div ref={menuRef} style={{position:'relative'}}>
            <IBtn ico="move" onClick={()=>sShowMove(!showMove)} title="Mover a otra sección" active={showMove}/>
            {showMove&&(
              <div onClick={e=>e.stopPropagation()}
                style={{position:'absolute',right:0,top:'calc(100% + 4px)',zIndex:300,background:'white',border:'1px solid #e2e8f0',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,.12)',padding:'6px',minWidth:165}}>
                <p style={{fontSize:9,color:'#94a3b8',padding:'0 6px 5px',textTransform:'uppercase',letterSpacing:'0.07em'}}>Mover a sección</p>
                {moveCats.map(c=>(
                  <button key={c.id} onClick={()=>{onMoveBlock(block.id,c.id);sShowMove(false);}}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:7,padding:'5px 8px',borderRadius:5,border:'none',cursor:'pointer',textAlign:'left',
                      background:blockCat===c.id?'#eff6ff':'transparent',color:blockCat===c.id?'#2563eb':'#475569',fontSize:11,fontWeight:blockCat===c.id?650:400}}>
                    <Ico n={c.ico||'archive'} s={11} c={blockCat===c.id?'#2563eb':'#94a3b8'}/>
                    {c.label}
                    {blockCat===c.id&&<span style={{marginLeft:'auto',fontSize:9,color:'#93c5fd'}}>actual</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
          {onDeleteBlock&&<IBtn ico="trash" onClick={onDeleteBlock} title="Eliminar bloque" danger/>}
          <Ico n={collapsed?'chdown':'chup'} s={11} c="#cbd5e1"/>
        </div>
      </div>
      {!collapsed&&(
        <div style={{padding:'3px 3px 5px'}}>
          {vis.map(t=>(
            <TaskItem key={t.id} task={t} compact
              onPriority={p=>onUpdate(t.id,{priority:p})}
              onEdit={tx=>onUpdate(t.id,{text:tx})}
              onDelete={()=>onDelete(t.id)}
              onToday={onToday?()=>onToday(t):undefined}
              onToVarios={onToVarios?()=>onToVarios(t):undefined}
              onToWeek={onToWeek?d=>onToWeek(t,d):undefined}
              onToBlock={undefined}
              allBlocks={allBlocks}
              blockNames={blockNames}
              onDeleteBlock={onDeleteBlockFromPicker}
            />
          ))}
          {vis.length===0&&<p style={{fontSize:10,color:tasks.length?'#e2e8f0':'#f1f5f9',padding:'3px 10px'}}>{tasks.length?'Sin resultados':'Sin tareas'}</p>}
          {add&&(
            <div style={{padding:'3px 18px'}}>
              <input ref={addRef} value={nt} onChange={e=>sNt(e.target.value)} onBlur={doAdd}
                onKeyDown={e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape'){sAdd(false);sNt('');}}}
                placeholder="Nueva tarea..."
                style={{width:'100%',border:'none',borderBottom:'1px solid #e2e8f0',outline:'none',fontSize:11,color:'#1e293b',background:'transparent',padding:'2px 0',fontFamily:'inherit'}}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

            {showBlkPick&&<BlockPickerPopup allBlocks={allBlocks||[]} blockNames={blockNames||{}} onPick={bId=>{onMoveToBlock(t,bId,day);setShowBlkPick(false);}} onClose={()=>setShowBlkPick(false)} onDeleteBlock={onDeleteBlock}/>}
          </div>
        )}
        <button onClick={e=>{e.stopPropagation();onDelete(day,t.id);}} style={{border:'none',background:'transparent',cursor:'pointer',color:'#d1d5db',padding:0,display:'flex',flexShrink:0,marginTop:1}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#d1d5db'}>
          <Ico n="x" s={13}/>
        </button>
      </div>
    </div>
  );
}

/* ── HOY PANEL ── agenda de slots en TRABAJO + lista VARIOS ── */
function TodayPanel({work,dayVarios,onAddWork,onDelWork,onUpdWork,onMoveToVarios,onAddVarios,onDeleteVarios,onUpdateVarios,onMoveToWork,onMoveToWeek,onMoveToBlock,allBlocks,blockNames,onDeleteBlock,isMobile}){
  // work es ahora {slot: [{id,text,priority,...}]}
  const[addingSlot,sAddingSlot]=useState(null);// slot key donde se está añadiendo
  const[ntW,sNtW]=useState('');
  const[addingV,sAddingV]=useState(false);const[ntV,sNtV]=useState('');
  const[dragging,sDragging]=useState(null);// {id, fromSlot}
  const[dragOverSlot,sDragOverSlot]=useState(null);
  const[dragOverVarios,sDragOverVarios]=useState(false);
  const workAddRef=useRef();const variosRef=useRef();
  useEffect(()=>{if(addingSlot!==null&&workAddRef.current)workAddRef.current.focus();},[addingSlot]);
  useEffect(()=>{if(addingV&&variosRef.current)variosRef.current.focus();},[addingV]);

  const nowH=new Date().getHours();const nowM=new Date().getMinutes();
  const currentSlotKey=nowH<8?null:(nowH>18||(nowH===18&&nowM>0))?'noche':`${nowH}:${nowM<30?'00':'30'}`;

  const doAddW=()=>{if(ntW.trim()&&addingSlot!==null)onAddWork(addingSlot,ntW.trim());sNtW('');sAddingSlot(null);};
  const doAddV=()=>{if(ntV.trim())onAddVarios(ntV.trim());sNtV('');sAddingV(false);};

  const totalV=dayVarios.reduce((a,t)=>a+(parseInt(t.mins)||0),0);
  const fmt=m=>{if(!m)return'';if(m<60)return`${m}m`;return`${Math.floor(m/60)}h${m%60?` ${m%60}m`:''}`;};

  // Drag dentro de trabajo (entre slots)
  const handleDragStartWork=(e,id,fromSlot)=>{
    e.dataTransfer.setData('hoy-work',JSON.stringify({id,fromSlot}));
    e.dataTransfer.effectAllowed='move';sDragging({id,fromSlot,list:'work'});
  };
  // Drag desde varios
  const handleDragStartVarios=(e,id)=>{
    e.dataTransfer.setData('hoy-varios',JSON.stringify({id}));
    e.dataTransfer.effectAllowed='move';sDragging({id,list:'varios'});
  };
  const handleDropOnSlot=(e,toSlot)=>{
    e.preventDefault();
    // viene de work?
    try{const d=JSON.parse(e.dataTransfer.getData('hoy-work'));if(d.fromSlot!==toSlot)onUpdWork(d.id,{slot:toSlot},d.fromSlot);}catch{}
    // viene de varios?
    try{const d=JSON.parse(e.dataTransfer.getData('hoy-varios'));onMoveToWork(d.id,toSlot);}catch{}
    sDragOverSlot(null);sDragging(null);
  };
  const handleDropOnVarios=(e)=>{
    e.preventDefault();
    try{const d=JSON.parse(e.dataTransfer.getData('hoy-work'));onMoveToVarios(d.id,d.fromSlot);}catch{}
    sDragOverVarios(false);sDragging(null);
  };

  const allWorkTasks=Object.values(work).flat();
  const totalWorkCount=allWorkTasks.length;

  return(
    <div style={{background:'white',border:'1px solid #e8ecf0',borderRadius:10,marginBottom:14,overflow:'hidden',
      height:isMobile?'auto':'min(620px,60vh)',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px 8px',borderBottom:'1px solid #f1f5f9',flexShrink:0}}>
        <span style={{fontSize:10,fontWeight:750,color:'#1e293b',letterSpacing:'0.1em'}}>HOY</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'#94a3b8'}}>{new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'})}</span>
          {!isMobile&&<span style={{fontSize:9,color:'#d1d5db'}}>arrastra entre slots y listas</span>}
        </div>
      </div>
      {/* Body */}
      <div style={{display:'flex',flex:1,overflow:'hidden',flexDirection:isMobile?'column':'row'}}>

        {/* ── TRABAJO — agenda de slots ── */}
        <div style={{flex:isMobile?'none':'0 0 62%',display:'flex',flexDirection:'column',overflow:'hidden',borderRight:isMobile?'none':'1px solid #f1f5f9',borderBottom:isMobile?'1px solid #f1f5f9':'none'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 12px',borderBottom:'1px solid #f4f6f8',flexShrink:0}}>
            <span style={{fontSize:10,fontWeight:700,color:'#64748b',letterSpacing:'0.06em'}}>TRABAJO</span>
            <span style={{fontSize:9,color:'#cbd5e1'}}>{totalWorkCount} tarea{totalWorkCount!==1?'s':''}</span>
          </div>
          <div style={{flex:1,overflowY:'auto',maxHeight:isMobile?300:'none'}}>
            {WORK_SLOTS.map(slot=>{
              const isHour=isHourSlot(slot);const isNoche=slot==='noche';
              const slotTasks=work[slot]||[];
              const isNow=slot===currentSlotKey;
              const isPastSlot=!isNow&&!isNoche&&(()=>{
                const[sh,sm]=slot.split(':').map(Number);
                return sh*60+sm < nowH*60+nowM;
              })();
              const isOver=dragOverSlot===slot;
              return(
                <div key={slot}
                  onDragOver={e=>{e.preventDefault();sDragOverSlot(slot);}}
                  onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))sDragOverSlot(null);}}
                  onDrop={e=>handleDropOnSlot(e,slot)}
                  style={{display:'flex',alignItems:'flex-start',
                    borderBottom:isHour&&!isNoche?'1px solid #f1f5f9':'1px solid #fafafa',
                    background:isOver?'#f0f9ff':isNow?'#fffbeb':isNoche?'#fafafa':'transparent',
                    transition:'background .08s',minHeight:isNoche?36:28}}>
                  {/* Etiqueta hora */}
                  <div style={{width:40,flexShrink:0,padding:'5px 6px 0 10px',textAlign:'right'}}>
                    <span style={{
                      fontSize:isNoche?11:isHour?13:11,
                      fontWeight:isNow?700:isHour?500:400,
                      color:isNow?'#d97706':isNoche?'#94a3b8':isPastSlot?'#e2e8f0':isHour?'#64748b':'#cbd5e1',
                      letterSpacing:isNoche?'0.04em':'0',
                      textTransform:isNoche?'uppercase':'none'
                    }}>
                      {isNoche?'Noche':isHour?slot:<span style={{fontSize:8}}>·{slot.split(':')[1]}</span>}
                    </span>
                    {isNow&&<div style={{width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginLeft:'auto',marginTop:2}}/>}
                  </div>
                  {/* Contenido del slot */}
                  <div style={{flex:1,padding:'3px 6px 3px 4px',minHeight:isNoche?36:28,display:'flex',flexDirection:'column',gap:2}}>
                    {slotTasks.map(t=>(
                      <WorkTaskCard key={t.id} t={t} slot={slot} dragging={dragging}
                        onDragStart={handleDragStartWork}
                        onDragEnd={()=>{sDragging(null);sDragOverSlot(null);}}
                        onUpdWork={onUpdWork}
                        onMoveToVarios={onMoveToVarios}
                        onMoveToWeek={onMoveToWeek}
                        onMoveToBlock={onMoveToBlock}
                        onDelWork={onDelWork}
                        allBlocks={allBlocks}
                        blockNames={blockNames}
                        onDeleteBlock={onDeleteBlock}
                      />
                    ))}
                    {addingSlot===slot
                      ?<input ref={workAddRef} value={ntW} onChange={e=>sNtW(e.target.value)} onBlur={doAddW}
                          onKeyDown={e=>{if(e.key==='Enter')doAddW();if(e.key==='Escape'){sAddingSlot(null);sNtW('');}}}
                          placeholder="Nueva tarea..."
                          style={{fontSize:11,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',background:'transparent',color:'#1e293b',fontFamily:'inherit',padding:'1px 0',width:'100%'}}/>
                      :<button onClick={()=>sAddingSlot(slot)}
                          style={{fontSize:13,color:'transparent',border:'none',background:'transparent',cursor:'pointer',padding:'1px 0',textAlign:'left',width:'100%',borderRadius:2}}
                          onMouseEnter={e=>e.currentTarget.style.color='#94a3b8'} onMouseLeave={e=>e.currentTarget.style.color='transparent'}>
                          + añadir
                        </button>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── VARIOS ── */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',
          background:dragOverVarios?'#f0f9ff':'transparent',transition:'background .08s'}}
          onDragOver={e=>{e.preventDefault();sDragOverVarios(true);}}
          onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))sDragOverVarios(false);}}
          onDrop={handleDropOnVarios}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 12px',borderBottom:'1px solid #f4f6f8',flexShrink:0}}>
            <span style={{fontSize:10,fontWeight:700,color:'#64748b',letterSpacing:'0.06em'}}>VARIOS</span>
            <span style={{fontSize:9,color:'#d1d5db'}}>sin hora</span>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'5px 8px'}}>
            {dayVarios.map(t=>(
              <VariosTaskCard key={t.id} t={t} dragging={dragging}
                onDragStart={handleDragStartVarios}
                onDragEnd={()=>{sDragging(null);sDragOverVarios(false);}}
                onUpdWork={onUpdWork}
                onMoveToWeek={onMoveToWeek}
                onMoveToBlock={onMoveToBlock}
                onDeleteVarios={onDeleteVarios}
                allBlocks={allBlocks}
                blockNames={blockNames}
                onDeleteBlock={onDeleteBlock}
              />
            ))}
            {addingV&&<input ref={variosRef} value={ntV} onChange={e=>sNtV(e.target.value)} onBlur={doAddV}
              onKeyDown={e=>{if(e.key==='Enter')doAddV();if(e.key==='Escape'){sAddingV(false);sNtV('');}}}
              placeholder="Nueva tarea varios..."
              style={{width:'100%',fontSize:11,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',background:'transparent',color:'#1e293b',fontFamily:'inherit',padding:'2px 0'}}/>}
          </div>
          <div style={{padding:'4px 8px 6px',borderTop:'1px solid #f4f6f8',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <button onClick={()=>sAddingV(true)}
              style={{display:'flex',alignItems:'center',gap:5,padding:'4px 7px',fontSize:11,color:'#94a3b8',border:'none',background:'transparent',cursor:'pointer',borderRadius:5}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(15,23,42,.04)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <Ico n="plus" s={12}/>Añadir
            </button>
            {totalV>0&&<span style={{fontSize:10,color:'#2563eb',fontWeight:700}}>{fmt(totalV)}</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

function WeekPanel({data,onAdd,onPriority,onDelete,onMoveTask,onMoveToToday,onMoveToVarios,onMoveToBlock,allBlocks,blockNames,onDeleteBlock,weekOffset,onOffsetChange,isMobile,gcalEvents}){
  const[addD,sAddD]=useState(null);const[nt,sNt]=useState('');
  const[dragTask,sDragTask]=useState(null);const[dragOver,sDragOver]=useState(null);
  const ref=useRef();
  const today=new Date();const todayDow=today.getDay();
  const todayNum=today.getDate();const todayMonth=today.getMonth();const todayYear=today.getFullYear();
  const mon=getMondayWithOffset(weekOffset);
  const weekKey=getWeekKey(mon);
  const weekDates=getWeekDatesFromMonday(mon);
  const weekData=data[weekKey]||{};
  const isCurrentWeek=weekOffset===0;
  useEffect(()=>{if(addD!==null&&ref.current)ref.current.focus();},[addD]);
  const doAdd=d=>{if(nt.trim())onAdd(weekKey,d,nt.trim());sNt('');sAddD(null);};
  const handleDragStart=(e,taskId,fromDay)=>{
    e.dataTransfer.setData('week',JSON.stringify({taskId,fromDay,weekKey}));
    e.dataTransfer.effectAllowed='move';sDragTask({taskId,fromDay});
  };
  const handleDrop=(e,toDay)=>{
    e.preventDefault();
    try{const p=JSON.parse(e.dataTransfer.getData('week'));if(p.fromDay!==toDay||p.weekKey!==weekKey)onMoveTask(p.taskId,p.fromDay,toDay,p.weekKey,weekKey);}catch{}
    sDragOver(null);sDragTask(null);
  };
  const wStart=weekDates['lun'];const wEnd=weekDates['dom'];
  const fmtRange=(a,b)=>{
    if(a.getMonth()===b.getMonth())return`${a.getDate()}–${b.getDate()} ${MONTH_NAMES[a.getMonth()].slice(0,3)} ${a.getFullYear()}`;
    return`${a.getDate()} ${MONTH_NAMES[a.getMonth()].slice(0,3)} – ${b.getDate()} ${MONTH_NAMES[b.getMonth()].slice(0,3)} ${b.getFullYear()}`;
  };
  const totalTasks=WDAYS.reduce((s,d)=>s+(weekData[d]||[]).length,0);
  return(
    <div style={{background:'white',border:'1px solid #e8ecf0',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,paddingBottom:8,borderBottom:'1px solid #f1f5f9'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:10,fontWeight:750,color:'#1e293b',letterSpacing:'0.1em'}}>SEMANA</span>
          {/* Navegación */}
          <button onClick={()=>onOffsetChange(weekOffset-1)} title="Semana anterior"
            style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e8ecf0',borderRadius:4,background:'transparent',cursor:'pointer',color:'#64748b',padding:0}}
            onMouseEnter={e=>e.currentTarget.style.background='#f1f5f9'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <Ico n="chup" s={10}/>
          </button>
          <span style={{fontSize:9,color:isCurrentWeek?'#2563eb':'#94a3b8',fontWeight:isCurrentWeek?700:400,minWidth:140,textAlign:'center'}}>
            {isCurrentWeek?'Esta semana · ':weekOffset<0?`Hace ${Math.abs(weekOffset)} sem · `:`En ${weekOffset} sem · `}
            {fmtRange(wStart,wEnd)}
          </span>
          <button onClick={()=>onOffsetChange(weekOffset+1)} title="Semana siguiente"
            style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #e8ecf0',borderRadius:4,background:'transparent',cursor:'pointer',color:'#64748b',padding:0}}
            onMouseEnter={e=>e.currentTarget.style.background='#f1f5f9'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <Ico n="chdown" s={10}/>
          </button>
          {weekOffset!==0&&(
            <button onClick={()=>onOffsetChange(0)} title="Volver a esta semana"
              style={{fontSize:9,padding:'2px 7px',borderRadius:10,border:'1px solid #bfdbfe',background:'#eff6ff',color:'#2563eb',cursor:'pointer',fontWeight:600}}>
              Hoy
            </button>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {totalTasks>0&&<span style={{fontSize:9,color:'#cbd5e1'}}>{totalTasks} tarea{totalTasks!==1?'s':''}</span>}
          <span style={{fontSize:9,color:'#d1d5db'}}>arrastra entre días</span>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:isMobile?'column':'row',gap:isMobile?8:4}}>
        {WDAYS.map(d=>{
          const tasks=weekData[d]||[];const isOver=dragOver===d;
          const dayDate=weekDates[d];const dayNum=dayDate.getDate();const dayMonth=dayDate.getMonth();const dayYear=dayDate.getFullYear();
          const isT=isCurrentWeek&&DOW[d]===todayDow;
          const isPast=dayYear<todayYear||(dayYear===todayYear&&(dayMonth<todayMonth||(dayMonth===todayMonth&&dayNum<todayNum)));
          const isFutureWeek=weekOffset>0;
          // dateStr para gcal
          const dateStr=`${dayYear}-${String(dayMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
          const dayGcal=(gcalEvents&&gcalEvents[dateStr])||[];
          return(
            <div key={d} style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
              <div style={{marginBottom:5,display:'flex',flexDirection:'row',alignItems:'center',gap:6}}>
                <span style={{fontSize:isMobile?15:12,fontWeight:700,color:isT?'#2563eb':isPast&&!isFutureWeek?'#cbd5e1':'#64748b'}}>{WLB[d]}</span>
                {isT&&<span style={{width:6,height:6,borderRadius:'50%',background:'#2563eb',display:'inline-block',flexShrink:0}}/>}
                <span style={{fontSize:isMobile?14:11,fontWeight:isT?700:400,color:isT?'#2563eb':isPast&&!isFutureWeek?'#d1d5db':'#94a3b8'}}>
                  {dayNum}{isT&&<span style={{fontSize:isMobile?11:8,fontWeight:500,color:'#93c5fd',marginLeft:2}}>{MONTH_NAMES[dayMonth].slice(0,3).toUpperCase()}</span>}
                </span>
                {tasks.length>0&&<span style={{fontSize:isMobile?12:9,fontWeight:400,color:'#cbd5e1',marginLeft:'auto'}}>({tasks.length})</span>}
              </div>
              <div
                onDragOver={e=>{e.preventDefault();sDragOver(d);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))sDragOver(null);}}
                onDrop={e=>handleDrop(e,d)}
                style={{flex:1,borderRadius:8,padding:isMobile?'8px 8px':'5px 5px',overflowY:'auto',
                  background:isOver?'#f0f9ff':isT?'#eff6ff':isFutureWeek?'#fafffe':'#f8fafc',
                  border:`1px solid ${isOver?'#93c5fd':isT?'#bfdbfe':isFutureWeek?'#d1fae5':'#edf0f3'}`,
                  minHeight:isMobile?50:90,transition:'background .08s,border-color .08s'}}>
                {/* Eventos de Google Calendar */}
                {dayGcal.map((ev,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:4,padding:'2px 4px',marginBottom:2,borderRadius:4,background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:'#16a34a',flexShrink:0,display:'inline-block'}}/>
                    <span style={{fontSize:10,color:'#15803d',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev}</span>
                  </div>
                ))}
                {tasks.map(t=>(
                  <WeekTaskCard key={t.id} t={t} day={d} dragTask={dragTask}
                    onDragStart={handleDragStart}
                    onDragEnd={()=>{sDragTask(null);sDragOver(null);}}
                    onPriority={(day,id,p)=>onPriority(weekKey,day,id,p)}
                    onDelete={(day,id)=>onDelete(weekKey,day,id)}
                    onMoveToToday={onMoveToToday?(t,d)=>onMoveToToday(t,d,weekKey):null}
                    onMoveToVarios={onMoveToVarios?(t,d)=>onMoveToVarios(t,d,weekKey):null}
                    onMoveToBlock={onMoveToBlock?(t,bId,d)=>onMoveToBlock(t,bId,d,weekKey):null}
                    allBlocks={allBlocks}
                    blockNames={blockNames}
                    onDeleteBlock={onDeleteBlock}
                  />
                ))}
                {addD===d
                  ?<input ref={ref} value={nt} onChange={e=>sNt(e.target.value)}
                      onBlur={()=>doAdd(d)}
                      onKeyDown={e=>{if(e.key==='Enter')doAdd(d);if(e.key==='Escape'){sAddD(null);sNt('');}}}
                      placeholder="Nueva tarea..."
                      style={{width:'100%',fontSize:11,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',background:'transparent',color:'#1e293b',fontFamily:'inherit',padding:'2px 0'}}/>
                  :<button onClick={()=>sAddD(d)}
                      style={{fontSize:13,color:'#d1d5db',border:'none',background:'transparent',cursor:'pointer',padding:'4px 3px',width:'100%',textAlign:'left',borderRadius:3}}>
                      + añadir
                    </button>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── COLUMNA DE MES ──────────────── */
function MonthColumn({allData,monthIdx,onChangeMonth,onSetText,gcalEvents}){
  const[editing,setEditing]=useState(null);const[draft,setDraft]=useState('');const[showPicker,setShowPicker]=useState(false);
  const ref=useRef();const pickerRef=useRef();
  const today=new Date().getDate();const todayMonth=new Date().getMonth()+1;
  const days=daysInMonth(monthIdx);const data=allData[monthIdx]||{};const isCurrentMonth=monthIdx===todayMonth;
  useEffect(()=>{if(editing!==null&&ref.current)ref.current.focus();},[editing]);
  useEffect(()=>{
    if(!showPicker)return;
    const fn=e=>{if(pickerRef.current&&!pickerRef.current.contains(e.target))setShowPicker(false);};
    document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);
  },[showPicker]);
  const commit=d=>{onSetText(monthIdx,d,draft);setEditing(null);};
  return(
    <div style={{width:230,flexShrink:0,display:'flex',flexDirection:'column',background:'white',border:'1px solid #e8ecf0',borderRadius:10,overflow:'hidden'}}>
      <div style={{padding:'10px 12px 8px',borderBottom:'1px solid #f4f6f8',position:'relative'}} ref={pickerRef}>
        <button onClick={()=>setShowPicker(!showPicker)} style={{display:'flex',alignItems:'center',gap:5,border:'none',background:'transparent',cursor:'pointer',padding:0,width:'100%'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#1e293b',textTransform:'uppercase',letterSpacing:'0.05em'}}>{MONTH_NAMES[monthIdx-1]}</span>
          <Ico n="chdown" s={11} c="#94a3b8"/>
          <span style={{marginLeft:'auto',fontSize:9,color:'#cbd5e1'}}>{days} días</span>
        </button>
        {showPicker&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:200,background:'white',border:'1px solid #e2e8f0',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,.12)',padding:6,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:2}}>
            {MONTH_NAMES.map((m,i)=>(
              <button key={i} onClick={()=>{onChangeMonth(i+1);setShowPicker(false);}}
                style={{padding:'4px 6px',borderRadius:5,border:'none',cursor:'pointer',fontSize:10,background:(i+1)===monthIdx?'#eff6ff':'transparent',color:(i+1)===monthIdx?'#2563eb':'#475569',fontWeight:(i+1)===monthIdx?650:400}}>
                {m.slice(0,3)}
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{overflowY:'auto',flex:1,padding:'4px 6px'}}>
        {Array.from({length:days},(_,i)=>i+1).map(d=>{
          const text=data[d]||'';const isT=isCurrentMonth&&d===today;const isPast=isCurrentMonth&&d<today;
          const dateStr=`${new Date().getFullYear()}-${String(monthIdx).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

              <div style={{flex:1,minWidth:0}}>

                      style={{width:'100%',fontSize:10,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',background:'transparent',color:'#1e293b',fontFamily:'inherit',padding:0}}/>
                  :<span onDoubleClick={()=>{setEditing(d);setDraft(text);}}
                      style={{fontSize:10,color:text?'#374151':'#e5e7eb',lineHeight:'1.4',cursor:'text',wordBreak:'break-word',minHeight:14,display:'block'}}>

  );
}

/* ── APP ─────────────────────────── */
function App(){
  const saved=load();
  const isMobile=useIsMobile();
  const[cat,sCat]=useState('home');const[sb,setSb]=useState(true);
  const[filter,sFilter]=useState('all');const[search,sSearch]=useState('');const[palette,sPalette]=useState(false);
  const[tasks,sTasks]=useState(()=>saved?.tasks||seedTasks());
  const[dayWork,sDayWork]=useState(()=>saved?.dayWork||seedDayWork());
  const[dayVarios,sDayVarios]=useState(()=>saved?.dayVarios||seedDayVarios());
  const[week,sWeek]=useState(()=>saved?.week||seedWeek());
  const[monthAllData,sMonthAllData]=useState(()=>saved?.monthAllData||seedMonthData());
  const[monthAIdx,sMonthAIdx]=useState(()=>saved?.monthAIdx||5);
  const[monthBIdx,sMonthBIdx]=useState(()=>saved?.monthBIdx||6);
  const[customBlocks,sCustomBlocks]=useState(()=>saved?.customBlocks||[]);
  const[blockNames,sBlockNames]=useState(()=>saved?.blockNames||{});
  const[blockCats,sBlockCats]=useState(()=>{
    if(saved?.blockCats)return saved.blockCats;
    const m={};BASE_BLK.forEach(b=>m[b.id]=b.cat);return m;
  });
  const[customCats,sCustomCats]=useState(()=>saved?.customCats||[]);
  const[collapsedBlocks,sCollapsedBlocks]=useState(()=>saved?.collapsedBlocks||{});
  const[hiddenBlocks,sHiddenBlocks]=useState(()=>saved?.hiddenBlocks||[]);
  const[blockOrderIds,sBlockOrderIds]=useState(()=>saved?.blockOrderIds||[]);
  const[catOrder,sCatOrder]=useState(()=>saved?.catOrder||[]);
  const[hiddenCats,sHiddenCats]=useState(()=>saved?.hiddenCats||[]);
  const[weekOffset,sWeekOffset]=useState(0);
  const[addingCat,sAddingCat]=useState(false);const[newCatName,sNewCatName]=useState('');
  const[gcalEvents,sGcalEvents]=useState({});// {YYYY-MM-DD:[titulo,...]}
  const[gcalStatus,sGcalStatus]=useState('idle');// idle|loading|connected|error
  const[syncStatus,setSyncStatus]=useState('connecting'); // connecting|connected|saving|saved|error
  const[fbLoaded,setFbLoaded]=useState(false);
  const newCatRef=useRef();
  const _ignoreNextSave=useRef(false);
  useEffect(()=>{if(addingCat&&newCatRef.current)newCatRef.current.focus();},[addingCat]);

  // Suscribirse a Firebase para recibir cambios en tiempo real
  useEffect(()=>{
    subscribeFirebase(data=>{
      // Solo ignorar si venimos de un save propio Y ya tenemos datos cargados
      if(_ignoreNextSave.current&&fbLoaded){_ignoreNextSave.current=false;return;}
      _ignoreNextSave.current=false;
      const d=parseSavedData(JSON.stringify(data));
      if(!d)return;
      // Actualizar todos los estados con los datos de Firebase
      if(d.tasks)sTasks(d.tasks);
      if(d.dayWork)sDayWork(d.dayWork);
      if(d.dayVarios)sDayVarios(d.dayVarios);
      if(d.week)sWeek(d.week);
      if(d.monthAllData)sMonthAllData(d.monthAllData);
      if(d.monthAIdx)sMonthAIdx(d.monthAIdx);
      if(d.monthBIdx)sMonthBIdx(d.monthBIdx);
      if(d.customBlocks)sCustomBlocks(d.customBlocks);
      if(d.blockNames)sBlockNames(d.blockNames);
      if(d.blockCats)sBlockCats(d.blockCats);
      if(d.customCats)sCustomCats(d.customCats);
      if(d.collapsedBlocks)sCollapsedBlocks(d.collapsedBlocks);
      if(d.hiddenBlocks)sHiddenBlocks(d.hiddenBlocks);
      if(d.blockOrderIds)sBlockOrderIds(d.blockOrderIds);
      if(d.catOrder)sCatOrder(d.catOrder);
      if(d.hiddenCats)sHiddenCats(d.hiddenCats);
      setFbLoaded(true);
    });
    // Escuchar estado de sincronización
    const fn=e=>{
      setSyncStatus(e.detail);
      if(e.detail==='saved')setTimeout(()=>setSyncStatus('connected'),2000);
    };
    window.addEventListener('fb-status',fn);
    return()=>window.removeEventListener('fb-status',fn);
  },[]);

  const handlePickFile=async()=>{
    const h=await pickFile();
    if(h){
      const state={tasks,dayWork,dayVarios,week,monthAllData,monthAIdx,monthBIdx,customBlocks,blockNames,blockCats,customCats,collapsedBlocks,hiddenBlocks,blockOrderIds,catOrder,hiddenCats};
      save(state);
    }
  };

  useEffect(()=>{
    _ignoreNextSave.current=true;
    save({tasks,dayWork,dayVarios,week,monthAllData,monthAIdx,monthBIdx,customBlocks,blockNames,blockCats,customCats,collapsedBlocks,hiddenBlocks,blockOrderIds,catOrder,hiddenCats});
  },[tasks,dayWork,dayVarios,week,monthAllData,monthAIdx,monthBIdx,customBlocks,blockNames,blockCats,customCats,collapsedBlocks,hiddenBlocks,blockOrderIds,catOrder,hiddenCats]);
  useEffect(()=>{
    const fn=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();sPalette(p=>!p);}};
    window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);
  },[]);

  const exportData=()=>{
    const data={tasks,dayWork,dayVarios,week,monthAllData,monthAIdx,monthBIdx,customBlocks,blockNames,blockCats,customCats,collapsedBlocks,hiddenBlocks,blockOrderIds,catOrder,hiddenCats};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='agenda-datos.json';a.click();URL.revokeObjectURL(url);
  };

  const importData=(jsonStr)=>{
    try{
      const d=JSON.parse(jsonStr);
      localStorage.setItem(SK,JSON.stringify(d));
      // Subir directamente a Firebase sin esperar al useEffect
      save(d);
      alert('✅ Datos importados y subiendo a Firebase. La página se recargará.');
      setTimeout(()=>window.location.reload(),2000);
    }catch(e){alert('❌ Error al importar: '+e.message);}
  };

  const forceReloadFromFirebase=()=>{
    setSyncStatus('connecting');
    try{
      firebase.database().ref('agenda').once('value').then(snap=>{
        const val=snap.val();
        console.log('FB val keys:', val?Object.keys(val):'null');
        if(!val){setSyncStatus('error');return;}
        try{
          if(val.tasks)sTasks(val.tasks);
          if(val.dayWork){
            // migrar dayWork si es array
            if(Array.isArray(val.dayWork)){
              const newDw={};WORK_SLOTS.forEach(sl=>newDw[sl]=[]);
              val.dayWork.forEach(t=>{const sl=t.slot||'9:00';if(!newDw[sl])newDw[sl]=[];newDw[sl].push(t);});
              sDayWork(newDw);
            } else {sDayWork(val.dayWork);}
          }
          if(val.dayVarios)sDayVarios(val.dayVarios);
          if(val.week)sWeek(val.week);
          if(val.monthAllData)sMonthAllData(val.monthAllData);
          if(val.monthAIdx)sMonthAIdx(val.monthAIdx);
          if(val.monthBIdx)sMonthBIdx(val.monthBIdx);
          if(val.customBlocks)sCustomBlocks(val.customBlocks);
          if(val.blockNames)sBlockNames(val.blockNames);
          if(val.blockCats)sBlockCats(val.blockCats);
          if(val.customCats)sCustomCats(val.customCats);
          if(val.collapsedBlocks)sCollapsedBlocks(val.collapsedBlocks);
          if(val.hiddenBlocks)sHiddenBlocks(val.hiddenBlocks);
          if(val.blockOrderIds)sBlockOrderIds(val.blockOrderIds);
          if(val.catOrder)sCatOrder(val.catOrder);
          if(val.hiddenCats)sHiddenCats(val.hiddenCats);
          try{localStorage.setItem(SK,JSON.stringify(val));}catch{}
          console.log('Datos aplicados OK');
          setSyncStatus('saved');
        }catch(e){console.error('Apply error:',e);setSyncStatus('error');}
      }).catch(e=>{console.error('FB fetch error:',e);setSyncStatus('error');});
    }catch(e){console.error('FB init error:',e);setSyncStatus('error');}
  };

  const pushLocalToFirebase=()=>{
    try{
      const raw=localStorage.getItem(SK)||localStorage.getItem(SK_OLD);
      if(!raw){alert('No hay datos locales para subir.');return;}
      const d=JSON.parse(raw);
      fbdb.ref(FB_PATH).set(d)
        .then(()=>alert('✅ Datos subidos a Firebase correctamente. Ahora ábrelo en GitHub Pages.'))
        .catch(e=>alert('❌ Error: '+e.message));
    }catch(e){alert('❌ Error: '+e.message);}
  };

  const connectGcal=()=>{
    sGcalStatus('loading');
    try{
      gcalLogin(async token=>{
        try{
          const events=await gcalFetchEvents(token);
          sGcalEvents(gcalEventsToMap(events));
          sGcalStatus('connected');
        }catch(e){console.error(e);sGcalStatus('error');}
      });
    }catch(e){console.error(e);sGcalStatus('error');}
  };

  const addTask=(bId,text,priority='blue')=>{const t=mkt(text,priority);sTasks(p=>({...p,[bId]:[...(p[bId]||[]),t]}));};
  const updTask=(bId,id,u)=>sTasks(p=>({...p,[bId]:(p[bId]||[]).map(t=>t.id===id?{...t,...u}:t)}));
  const delTask=(bId,id)=>sTasks(p=>({...p,[bId]:(p[bId]||[]).filter(t=>t.id!==id)}));
  const moveBlock=(blockId,newCat)=>sBlockCats(p=>({...p,[blockId]:newCat}));
  const renameBlock=(blockId,name)=>sBlockNames(p=>({...p,[blockId]:name}));
  const createBlock=(name)=>{
    const currentCat=cat==='home'||cat==='meses'?'backlog':cat;
    const nb={id:uid(),name,cat:currentCat};
    sCustomBlocks(p=>[...p,nb]);sBlockCats(p=>({...p,[nb.id]:currentCat}));sTasks(p=>({...p,[nb.id]:[]}));
    sBlockOrderIds(p=>[...p,nb.id]);
  };
  const createCat=(name)=>{
    if(!name.trim())return;
    sCustomCats(p=>[...p,{id:`cat-${uid()}`,label:name.trim().toUpperCase(),ico:'layers'}]);
    sAddingCat(false);sNewCatName('');
  };

  const addDayWork=(slot,tx)=>{const t={...mkt(tx,'blue'),slot};sDayWork(p=>({...p,[slot]:[...(p[slot]||[]),t]}));};
  const delDayWork=(id,slot)=>sDayWork(p=>({...p,[slot]:(p[slot]||[]).filter(t=>t.id!==id)}));
  const updDayWork=(id,u,slot)=>{
    if(u.slot&&u.slot!==slot){// mover a otro slot
      sDayWork(p=>{const task=(p[slot]||[]).find(t=>t.id===id);if(!task)return p;return{...p,[slot]:(p[slot]||[]).filter(t=>t.id!==id),[u.slot]:[...(p[u.slot]||[]),{...task,slot:u.slot}]};});
    }else{sDayWork(p=>({...p,[slot]:(p[slot]||[]).map(t=>t.id===id?{...t,...u}:t)}));}
  };
  const moveWorkToVarios=(id,slot)=>{const t=(dayWork[slot]||[]).find(x=>x.id===id);if(!t)return;sDayWork(p=>({...p,[slot]:(p[slot]||[]).filter(x=>x.id!==id)}));sDayVarios(p=>[...p,t]);};
  const moveVariosToWork=(id,slot='9:00')=>{const t=dayVarios.find(x=>x.id===id);if(!t)return;sDayVarios(p=>p.filter(x=>x.id!==id));sDayWork(p=>({...p,[slot]:[...(p[slot]||[]),{...t,slot}]}));};
  const moveToTodayFromBlock=task=>{const slot=currentSlotFromNow();sDayWork(p=>({...p,[slot]:[...(p[slot]||[]),{...task,id:uid(),slot}]}));};

  function currentSlotFromNow(){const n=new Date(),h=n.getHours(),m=n.getMinutes();if(h<8)return'8:00';if(h>18||(h===18&&m>0))return'noche';return`${h}:${m<30?'00':'30'}`;};

  const addDayVarios=(tx)=>{sDayVarios(p=>[...p,{...mkt(tx,'blue'),mins:0}]);};
  const delDayVarios=(id)=>sDayVarios(p=>p.filter(t=>t.id!==id));
  const updDayVarios=(id,u)=>sDayVarios(p=>p.map(t=>t.id===id?{...t,...u}:t));

  const moveToVariosFromBlock=task=>{sDayVarios(p=>[...p,{...task,id:uid(),mins:0}]);};

  // Helper: a partir de dateStr "YYYY-MM-DD" devuelve {monthIdx, day}
  const dateToMonthDay=(dateStr)=>{const d=new Date(dateStr+'T12:00:00');return{monthIdx:d.getMonth()+1,day:d.getDate()};};

  // Bloque → Semana + Mes (weekKey viene del WeekPanel activo)
  const moveBlockToWeek=(task,blockId,dayKey,weekKey,dateStr)=>{
    delTask(blockId,task.id);
    sWeek(p=>({...p,[weekKey]:{...(p[weekKey]||{}),[dayKey]:[...(p[weekKey]?.[dayKey]||[]),{...task,id:uid()}]}}));
    if(dateStr){
      const{monthIdx,day}=dateToMonthDay(dateStr);
      sMonthAllData(p=>({...p,[monthIdx]:{...(p[monthIdx]||{}),[day]:(p[monthIdx]?.[day]?p[monthIdx][day]+' · ':'')+task.text}}));
    }
  };

  // HOY → Semana + Mes
  const moveTodayToWeek=(task,dateStr,slot,source)=>{
    if(source==='work') sDayWork(p=>({...p,[slot]:(p[slot]||[]).filter(t=>t.id!==task.id)}));
    else sDayVarios(p=>p.filter(t=>t.id!==task.id));
    const d=new Date(dateStr+'T12:00:00');
    const weekKey=getWeekKey(getMondayOf(d));
    const dayKey=WDAYS[((d.getDay()+6)%7)];
    sWeek(p=>({...p,[weekKey]:{...(p[weekKey]||{}),[dayKey]:[...(p[weekKey]?.[dayKey]||[]),{...task,id:uid()}]}}));
    const{monthIdx,day}=dateToMonthDay(dateStr);
    sMonthAllData(p=>({...p,[monthIdx]:{...(p[monthIdx]||{}),[day]:(p[monthIdx]?.[day]?p[monthIdx][day]+' · ':'')+task.text}}));
  };

  // HOY → Bloque
  const moveTodayToBlock=(task,blockId,slot,source)=>{
    if(source==='work') sDayWork(p=>({...p,[slot]:(p[slot]||[]).filter(t=>t.id!==task.id)}));
    else sDayVarios(p=>p.filter(t=>t.id!==task.id));
    sTasks(p=>({...p,[blockId]:[...(p[blockId]||[]),{...task,id:uid()}]}));
  };

  // Semana → HOY trabajo
  const moveWeekToToday=(task,fromDay,weekKey)=>{
    delWeek(weekKey,fromDay,task.id);
    const slot=currentSlotFromNow();
    sDayWork(p=>({...p,[slot]:[...(p[slot]||[]),{...task,id:uid(),slot}]}));
  };

  // Semana → HOY varios
  const moveWeekToVarios=(task,fromDay,weekKey)=>{
    delWeek(weekKey,fromDay,task.id);
    sDayVarios(p=>[...p,{...task,id:uid(),mins:0}]);
  };

  // Semana → Bloque
  const moveWeekToBlock=(task,blockId,fromDay,weekKey)=>{
    delWeek(weekKey,fromDay,task.id);
    sTasks(p=>({...p,[blockId]:[...(p[blockId]||[]),{...task,id:uid()}]}));
  };

  const addWeek=(weekKey,d,tx)=>{const t=mkt(tx,'blue');sWeek(p=>({...p,[weekKey]:{...(p[weekKey]||{}),[d]:[...(p[weekKey]?.[d]||[]),t]}}));};
  const delWeek=(weekKey,d,id)=>sWeek(p=>({...p,[weekKey]:{...(p[weekKey]||{}),[d]:(p[weekKey]?.[d]||[]).filter(t=>t.id!==id)}}));
  const updWeekPriority=(weekKey,d,id,pr)=>sWeek(prev=>({...prev,[weekKey]:{...(prev[weekKey]||{}),[d]:(prev[weekKey]?.[d]||[]).map(t=>t.id===id?{...t,priority:pr}:t)}}));
  const moveWeekTask=(taskId,fromDay,toDay,fromKey,toKey)=>{sWeek(p=>{const task=(p[fromKey]?.[fromDay]||[]).find(t=>t.id===taskId);if(!task)return p;const p2={...p,[fromKey]:{...(p[fromKey]||{}),[fromDay]:(p[fromKey]?.[fromDay]||[]).filter(t=>t.id!==taskId)}};return{...p2,[toKey]:{...(p2[toKey]||{}),[toDay]:[...(p2[toKey]?.[toDay]||[]),task]}};});};

  // Migrar week viejo (sin weekKey) a nueva estructura
  useEffect(()=>{
    if(week&&!Object.keys(week).some(k=>k.includes('-W'))){

  const setBlockCollapsed=(id,val)=>sCollapsedBlocks(p=>({...p,[id]:val}));
  const deleteBlock=(id)=>sHiddenBlocks(p=>[...p.filter(x=>x!==id),id]);
  const moveBlockUp=(id,visList)=>{const idx=visList.findIndex(b=>b.id===id);if(idx<=0)return;const prevId=visList[idx-1].id;sBlockOrderIds(prev=>{const arr=[...prev];const ai=arr.indexOf(id);const bi=arr.indexOf(prevId);if(ai===-1||bi===-1)return prev;[arr[ai],arr[bi]]=[arr[bi],arr[ai]];return arr;});};
  const moveBlockDown=(id,visList)=>{const idx=visList.findIndex(b=>b.id===id);if(idx===-1||idx>=visList.length-1)return;const nextId=visList[idx+1].id;sBlockOrderIds(prev=>{const arr=[...prev];const ai=arr.indexOf(id);const bi=arr.indexOf(nextId);if(ai===-1||bi===-1)return prev;[arr[ai],arr[bi]]=[arr[bi],arr[ai]];return arr;});};

  const setMonthText=(mIdx,d,text)=>sMonthAllData(p=>({...p,[mIdx]:{...(p[mIdx]||{}),[d]:text}}));

  const allCats=[...BASE_CATS,...customCats];
  const allBlocks=[...BASE_BLK,...customBlocks];
  // Mapa nombre bloque: primero los nombres base, luego los renombrados
  const allBlockNames=Object.fromEntries([...BASE_BLK,...customBlocks].map(b=>[b.id,blockNames[b.id]||b.name]));
  const getOrderIdx=id=>{const i=blockOrderIds.indexOf(id);return i===-1?9999:i;};
  const sortedBlocks=[...allBlocks].filter(b=>!hiddenBlocks.includes(b.id)).sort((a,b)=>getOrderIdx(a.id)-getOrderIdx(b.id));
  const visibleBlocks=cat==='home'?sortedBlocks:sortedBlocks.filter(b=>(blockCats[b.id]||b.cat)===cat);
  // Para los pickers de bloque: solo bloques visibles (no ocultos)
  const pickerBlocks=sortedBlocks;
  const allFlat=Object.values(tasks).flat();
  const redC=allFlat.filter(t=>t.priority==='red').length;
  const yelC=allFlat.filter(t=>t.priority==='yellow').length;

  const getCatOrderIdx=id=>{const i=catOrder.indexOf(id);return i===-1?9999:i;};
  const rawSidebarCats=allCats.filter(c=>c.id!=='home'&&c.id!=='meses'&&!hiddenCats.includes(c.id));
  const sidebarCats=[...rawSidebarCats].sort((a,b)=>getCatOrderIdx(a.id)-getCatOrderIdx(b.id));
  const moveCatUp=(id)=>{const idx=sidebarCats.findIndex(c=>c.id===id);if(idx<=0)return;const prevId=sidebarCats[idx-1].id;sCatOrder(prev=>{const arr=prev.length?[...prev]:sidebarCats.map(c=>c.id);const ai=arr.indexOf(id);const bi=arr.indexOf(prevId);if(ai===-1||bi===-1){const a2=[...sidebarCats.map(c=>c.id)];const ai2=a2.indexOf(id);const bi2=a2.indexOf(prevId);[a2[ai2],a2[bi2]]=[a2[bi2],a2[ai2]];return a2;}[arr[ai],arr[bi]]=[arr[bi],arr[ai]];return arr;});};
  const moveCatDown=(id)=>{const idx=sidebarCats.findIndex(c=>c.id===id);if(idx===-1||idx>=sidebarCats.length-1)return;const nextId=sidebarCats[idx+1].id;sCatOrder(prev=>{const arr=prev.length?[...prev]:sidebarCats.map(c=>c.id);const ai=arr.indexOf(id);const bi=arr.indexOf(nextId);if(ai===-1||bi===-1){const a2=[...sidebarCats.map(c=>c.id)];const ai2=a2.indexOf(id);const bi2=a2.indexOf(nextId);[a2[ai2],a2[bi2]]=[a2[bi2],a2[ai2]];return a2;}[arr[ai],arr[bi]]=[arr[bi],arr[ai]];return arr;});};

    <div style={{display:'flex',flexDirection:isMobile?'column':'row',height:isMobile?'auto':'100vh',minHeight:isMobile?'100vh':'auto',background:'#f8fafc',overflow:isMobile?'visible':'hidden'}}>

        <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:200,background:'white',borderTop:'1px solid #e8ecf0',display:'flex',justifyContent:'space-around',padding:'10px 0 max(14px,env(safe-area-inset-bottom))'}}>
          {[...allCats.filter(c=>c.id==='home'||c.id==='meses'),...sidebarCats.slice(0,5)].map(c=>{

      <div style={{width:sb?182:44,flexShrink:0,background:'white',borderRight:'1px solid #e8ecf0',display:'flex',flexDirection:'column',transition:'width .18s ease',overflow:'hidden'}}>

        <nav style={{flex:1,padding:'6px 0',overflowY:'auto'}}>
          {allCats.filter(c=>c.id==='home'||c.id==='meses').map(c=>{

              <button key={c.id} onClick={()=>sCat(c.id)} title={!sb?c.label:undefined}

          {sidebarCats.map((c,ci)=>{

                    <>

                      {bCount>0&&<span style={{fontSize:9,color:'#cbd5e1',background:'#f4f6f8',borderRadius:8,padding:'1px 5px',flexShrink:0,marginRight:2}}>{bCount}</span>}
                    </>
                  )}
                </button>
                {sb&&(
                  <div className="cat-actions" style={{position:'absolute',right:4,display:'flex',gap:1,opacity:0,transition:'opacity .1s',background:active?'#f1f5f9':'white',borderRadius:4,padding:'1px'}}>
                    {ci>0&&<button onClick={e=>{e.stopPropagation();moveCatUp(c.id);}} title="Subir" style={{width:16,height:16,border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3,color:'#94a3b8'}} onMouseEnter={e=>e.currentTarget.style.color='#475569'} onMouseLeave={e=>e.currentTarget.style.color='#94a3b8'}><Ico n="chup" s={9}/></button>}
                    {ci<sidebarCats.length-1&&<button onClick={e=>{e.stopPropagation();moveCatDown(c.id);}} title="Bajar" style={{width:16,height:16,border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3,color:'#94a3b8'}} onMouseEnter={e=>e.currentTarget.style.color='#475569'} onMouseLeave={e=>e.currentTarget.style.color='#94a3b8'}><Ico n="chdown" s={9}/></button>}
                    <button onClick={e=>{e.stopPropagation();deleteCat(c.id);}} title="Ocultar sección" style={{width:16,height:16,border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3,color:'#94a3b8'}} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='#94a3b8'}><Ico n="x" s={9}/></button>
                  </div>
                )}
              </div>
            );
          })}
          {sb&&(
            <div style={{padding:'4px 10px'}}>
              {addingCat
                ?<input ref={newCatRef} value={newCatName} onChange={e=>sNewCatName(e.target.value)}
                    onBlur={()=>createCat(newCatName)}
                    onKeyDown={e=>{if(e.key==='Enter')createCat(newCatName);if(e.key==='Escape'){sAddingCat(false);sNewCatName('');}}}

                    style={{width:'100%',fontSize:11,border:'none',borderBottom:'1px solid #bfdbfe',outline:'none',background:'transparent',color:'#1e293b',fontFamily:'inherit',padding:'4px 0'}}/>

              <div style={{width:allFlat.length?`${redC/allFlat.length*100}%`:'0%',background:'#ef4444'}}/>
              <div style={{width:allFlat.length?`${yelC/allFlat.length*100}%`:'0%',background:'#eab308'}}/>
              <div style={{flex:1,background:'#e2e8f0'}}/>

            <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
              {PL.map(p=>(
                <span key={p} style={{display:'flex',alignItems:'center',gap:3,fontSize:9,color:'#94a3b8'}}>

          </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:isMobile?'visible':'hidden',minWidth:0,paddingBottom:isMobile?70:0}}>
        {/* HEADER */}
        <div style={{height:isMobile?60:48,display:'flex',alignItems:'center',justifyContent:'space-between',padding:isMobile?'0 12px':'0 16px',background:'white',borderBottom:'1px solid #e8ecf0',flexShrink:0,gap:8,position:isMobile?'sticky':'static',top:0,zIndex:100}}>
          <span style={{fontSize:isMobile?18:13,fontWeight:700,color:'#1e293b',flexShrink:0}}>{allCats.find(c=>c.id===cat)?.label||cat.toUpperCase()}</span>
          <div style={{display:'flex',alignItems:'center',gap:isMobile?5:7,flex:1,justifyContent:'flex-end'}}>
            {/* Indicador Firebase sync */}
            {syncStatus==='connecting'&&(
              <span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#94a3b8',flexShrink:0}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'#94a3b8',display:'inline-block',animation:'pulse 1s infinite'}}/>

            {syncStatus==='connected'&&(
              <span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#22c55e',flexShrink:0}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}/>

              </span>

            {/* Botón subir datos locales a Firebase */}
            <button onClick={pushLocalToFirebase} title="Subir datos locales a Firebase"
              style={{border:'none',background:'#16a34a',cursor:'pointer',color:'white',padding:'5px 10px',fontSize:11,borderRadius:6,flexShrink:0,fontWeight:700,whiteSpace:'nowrap'}}>
              ↑ Firebase

            <button onClick={forceReloadFromFirebase} title="Recargar datos de Firebase"

              ↺ Cargar
            </button>
            {/* Exportar / Importar */}
            <button onClick={exportData} title="Exportar datos como JSON"
              style={{border:'1px solid #e2e8f0',background:'transparent',cursor:'pointer',color:'#64748b',padding:'4px 8px',fontSize:11,borderRadius:6,flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background='#f1f5f9'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              ↓ JSON
            </button>
            <label title="Importar datos desde JSON"

                onDeleteVarios={delDayVarios}
                onUpdateVarios={updDayVarios}
                onMoveToWeek={(task,dateStr,slot,source)=>moveTodayToWeek(task,dateStr,slot,source)}
                onMoveToBlock={moveTodayToBlock}
                allBlocks={pickerBlocks}
                blockNames={allBlockNames}
                onDeleteBlock={deleteBlock}
                isMobile={isMobile}
              />

              {/* SEMANA — Lun a Dom, sin Varios, más ancha */}
              <WeekPanel data={week} onAdd={addWeek} onPriority={updWeekPriority} onDelete={delWeek} onMoveTask={moveWeekTask}
                onMoveToToday={moveWeekToToday}
                onMoveToVarios={moveWeekToVarios}
                onMoveToBlock={moveWeekToBlock}
                allBlocks={pickerBlocks}
                blockNames={allBlockNames}
                onDeleteBlock={deleteBlock}
                weekOffset={weekOffset}
                onOffsetChange={sWeekOffset}
                isMobile={isMobile}
                gcalEvents={gcalEvents}
              />

              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                <div style={{flex:1,height:'1px',background:'#f1f5f9'}}/>
                <span style={{fontSize:9,color:'#cbd5e1',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase'}}>Bloques · {allFlat.length} tareas</span>
                <div style={{flex:1,height:'1px',background:'#f1f5f9'}}/>
              </div>
            </>
          )}

          {cat!=='meses'&&(
            <div style={{columns:isMobile?1:cat==='home'?4:3,columnGap:10}}>
              {visibleBlocks.map((b,bIdx)=>(
                <TaskBlock key={b.id} block={b}
                  blockName={blockNames[b.id]||b.name}
                  blockCat={blockCats[b.id]||b.cat}
                  allCats={allCats}
                  allBlocks={pickerBlocks}
                  blockNames={allBlockNames}
                  tasks={tasks[b.id]||[]}
                  filter={filter} search={search}
                  collapsed={!!collapsedBlocks[b.id]}
                  onCollapse={val=>setBlockCollapsed(b.id,val)}
                  onAdd={tx=>addTask(b.id,tx)}
                  onUpdate={(id,u)=>updTask(b.id,id,u)}
                  onDelete={id=>delTask(b.id,id)}
                  onToday={t=>{moveToTodayFromBlock(t);delTask(b.id,t.id);}}
                  onToVarios={t=>{moveToVariosFromBlock(t);delTask(b.id,t.id);}}
                  onToWeek={(t,dateStr)=>{const wk=getWeekKey(getMondayWithOffset(weekOffset));const d=new Date(dateStr+'T12:00:00');const wkTarget=getWeekKey(getMondayOf(d));const dayKey=WDAYS[((d.getDay()+6)%7)];moveBlockToWeek(t,b.id,dayKey,wkTarget,dateStr);}}
                  onMoveBlock={moveBlock}
                  onRenameBlock={renameBlock}
                  onDeleteBlock={()=>deleteBlock(b.id)}
                  onDeleteBlockFromPicker={deleteBlock}
                  onMoveUp={bIdx>0?()=>moveBlockUp(b.id,visibleBlocks):null}
                  onMoveDown={bIdx<visibleBlocks.length-1?()=>moveBlockDown(b.id,visibleBlocks):null}
                />
              ))}
              <NewBlockBtn onCreateBlock={createBlock}/>
              {visibleBlocks.length===0&&(
                <div style={{padding:'30px 20px',textAlign:'center',color:'#cbd5e1',fontSize:12,breakInside:'avoid'}}>
                  <p>No hay bloques en esta sección.</p>
                  <p style={{fontSize:11,marginTop:4}}>Crea uno con "Nuevo bloque" o mueve bloques desde otras secciones.</p>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
/*FSDATA_INJECT*/
</script>
</body>
</html>
